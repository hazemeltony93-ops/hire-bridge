<div class="container">
  <div class="card">

    <div class="left">
      <h2>Password Recovery 🔑</h2>
      <p>Enter your email and we'll send you reset instructions.</p>
    </div>

    <div class="right">
      <h1>Forgot Password</h1>

      <form #forgotForm="ngForm" (ngSubmit)="onSubmit(forgotForm)">

        <input
          type="email"
          name="email"
          placeholder="Enter your email"
          [(ngModel)]="email"
          required
          email
          #emailRef="ngModel"
        />

        <div class="error" *ngIf="emailRef.invalid && emailRef.touched">
          Please enter a valid email
        </div>

        <button
          type="submit"
          [disabled]="forgotForm.invalid || loading">

          <span *ngIf="!loading">Send Reset Link</span>
          <span *ngIf="loading" class="spinner"></span>

        </button>

      </form>

      <div class="success fade-in" *ngIf="messageSent">
        Reset link sent successfully 🎉
      </div>

      <div class="links">
        <a routerLink="/">Back to Login</a>
      </div>

    </div>
  </div>
</div>
