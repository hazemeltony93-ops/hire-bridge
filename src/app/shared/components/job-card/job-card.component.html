<article class="job-card card-modern h-100">
  <div class="d-flex justify-content-between align-items-start gap-3">
    <div>
      <p class="job-role mb-1">{{ title }}</p>
      <p class="job-company mb-0">{{ company }}</p>
    </div>
    <span class="badge rounded-pill text-bg-primary-subtle text-primary-emphasis">{{ status || 'Match' }}</span>
  </div>

  <div class="job-meta d-flex flex-wrap gap-2">
    <span><i class="fas fa-location-dot"></i>{{ location }}</span>
    <span><i class="fas fa-wallet"></i>{{ salary }}</span>
  </div>

  <div>
    <div class="d-flex justify-content-between align-items-center mb-2">
      <span class="small fw-bold text-muted">Match score</span>
      <span class="small fw-bold text-primary">{{ match }}%</span>
    </div>
    <div class="progress" role="progressbar" [attr.aria-valuenow]="match" aria-valuemin="0" aria-valuemax="100">
      <div class="progress-bar" [style.width.%]="match"></div>
    </div>
  </div>

  <button
    type="button"
    class="btn btn-modern w-100 mt-auto"
    [disabled]="!canApply"
    (click)="apply.emit()"
  >
    {{ canApply ? 'Apply Now' : 'Unavailable' }}
  </button>
</article>
