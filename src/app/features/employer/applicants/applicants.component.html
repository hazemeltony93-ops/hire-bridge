<div class="container-fluid py-4">
  <section class="card shadow-sm border-0 mb-4" *ngIf="job">
    <div class="card-body p-4">
      <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap">
        <div>
          <p class="text-primary text-uppercase fw-semibold small mb-2">Applicants</p>
          <h1 class="h3 mb-2">{{ job.title }}</h1>
          <p class="text-muted mb-0">{{ job.description }}</p>
        </div>
        <a routerLink="/employer/jobs" class="btn btn-outline-secondary">Back to jobs</a>
      </div>
    </div>
  </section>

  <div *ngIf="error" class="alert alert-danger" role="alert">{{ error }}</div>
  <div *ngIf="successMessage" class="alert alert-success" role="alert">{{ successMessage }}</div>
  <div *ngIf="loading" class="alert alert-info" role="status">Loading applicants...</div>

  <section *ngIf="!loading && !error" class="card shadow-sm border-0">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th scope="col">Name</th>
              <th scope="col">Email</th>
              <th scope="col">Status</th>
              <th scope="col">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let applicant of paginatedApplicants">
              <td class="fw-semibold">{{ applicant.name }}</td>
              <td>{{ applicant.email }}</td>
              <td>
                <span class="badge text-capitalize" [ngClass]="getStatusBadgeClass(applicant.status)">
                  {{ applicant.status }}
                </span>
              </td>
              <td>
                <div class="d-flex gap-2 flex-wrap">
                  <button
                    type="button"
                    class="btn btn-success btn-sm"
                    [disabled]="applicant.status !== 'pending' || isProcessing(applicant.id)"
                    (click)="acceptApplicant(applicant.id)"
                  >
                    {{ isProcessing(applicant.id) ? 'Saving...' : 'Accept' }}
                  </button>
                  <button
                    type="button"
                    class="btn btn-danger btn-sm"
                    [disabled]="applicant.status !== 'pending' || isProcessing(applicant.id)"
                    (click)="rejectApplicant(applicant.id)"
                  >
                    {{ isProcessing(applicant.id) ? 'Saving...' : 'Reject' }}
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div *ngIf="paginatedApplicants.length === 0" class="p-4 text-muted">No applicants for this job yet.</div>

      <nav *ngIf="applicants.length > pageSize" class="p-3 border-top" aria-label="Applicants pages">
        <ul class="pagination mb-0">
          <li class="page-item" *ngFor="let page of pageNumbers" [class.active]="currentPage === page">
            <button type="button" class="page-link" (click)="goToPage(page)">
              {{ page }}
            </button>
          </li>
        </ul>
      </nav>
    </div>
  </section>
</div>
