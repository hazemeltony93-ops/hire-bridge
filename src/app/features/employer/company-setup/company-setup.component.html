<div class="auth-shell">
  <section class="brand-header">
    <div class="brand-mark">HB</div>
    <h1>HireBridge</h1>
    <p>Enterprise hiring and career workflows redefined</p>
  </section>

  <section class="auth-card wide-card">
    <div class="card-header">
      <h2>Company setup</h2>
      <p>Create your company workspace and prepare it for hiring</p>
    </div>

    <form (ngSubmit)="submit()" class="form two-column">
      <div class="field-block">
        <label for="company-name">Company Name</label>
        <div class="field with-icon">
          <i class="fas fa-building"></i>
          <input id="company-name" [(ngModel)]="name" name="name" placeholder="Your company name" (blur)="onBlur('name')" />
        </div>
      </div>

      <div class="field-block">
        <label for="company-email">Company Email</label>
        <div class="field with-icon">
          <i class="fas fa-envelope"></i>
          <input id="company-email" type="email" [(ngModel)]="CompanyEmail" name="CompanyEmail" placeholder="hr@company.com" (blur)="onBlur('CompanyEmail')" />
        </div>
      </div>

      <div class="field-block">
        <label for="company-industry">Industry</label>
        <div class="field with-icon">
          <i class="fas fa-layer-group"></i>
          <input id="company-industry" [(ngModel)]="industry" name="industry" placeholder="Technology" (blur)="onBlur('industry')" />
        </div>
      </div>

      <div class="field-block">
        <label for="company-size">Company Size</label>
        <div class="field with-icon">
          <i class="fas fa-users"></i>
          <input id="company-size" type="number" [(ngModel)]="size" name="size" placeholder="150" (blur)="onBlur('size')" />
        </div>
      </div>

      <div class="field-block">
        <label for="company-website">Website</label>
        <div class="field with-icon">
          <i class="fas fa-globe"></i>
          <input id="company-website" [(ngModel)]="website" name="website" placeholder="https://company.com" />
        </div>
      </div>

      <div class="field-block">
        <label for="company-logo">Logo URL</label>
        <div class="field with-icon">
          <i class="fas fa-image"></i>
          <input id="company-logo" [(ngModel)]="logo" name="logo" placeholder="https://company.com/logo.png" />
        </div>
      </div>

      <div class="field-block full">
        <label for="company-budget">Budget Range</label>
        <div class="field with-icon">
          <i class="fas fa-money-check-dollar"></i>
          <input id="company-budget" type="number" [(ngModel)]="budgetRange" name="budgetRange" placeholder="500000" (blur)="onBlur('budgetRange')" />
        </div>
      </div>

      <div class="field-block full">
        <div class="error" *ngIf="errorMsg">{{ errorMsg }}</div>
      </div>

      <div class="field-block full">
        <button type="submit" class="primary-btn" [disabled]="loading">
          <span *ngIf="!loading">Create Company <i class="fas fa-arrow-right"></i></span>
          <span *ngIf="loading" class="loader"></span>
        </button>
      </div>
    </form>
  </section>

  <footer class="page-footer">
    <span>© 2026 HireBridge. All rights reserved.</span>
    <nav>
      <a href="#">Privacy Policy</a>
      <a href="#">Terms of Service</a>
      <a href="#">Security</a>
      <a href="#">Contact Support</a>
    </nav>
  </footer>
</div>
