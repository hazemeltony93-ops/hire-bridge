<div class="container">
  <div class="card">

    <!-- LEFT -->
    <div class="left">
      <h2>Welcome Back 👋</h2>
      <p>Login to continue your journey</p>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <h1>Login</h1>

      <form (ngSubmit)="submit()" class="form">

        <!-- EMAIL -->
        <div class="field">
          <input
            type="email"
            placeholder=" "
            [(ngModel)]="email"
            name="email"
            (blur)="onBlur('email')"
          />
          <label>Email</label>

          <div class="error" *ngIf="touched.email && isEmpty(email)">
            Email is required
          </div>
        </div>

        <!-- PASSWORD -->
        <div class="field">
          <input
            type="password"
            placeholder=" "
            [(ngModel)]="password"
            name="password"
            (blur)="onBlur('password')"
          />
          <label>Password</label>

          <div class="error" *ngIf="touched.password && isEmpty(password)">
            Password is required
          </div>
        </div>

        <!-- 🔥 FORGOT PASSWORD -->
        <div class="forgot">
          <a routerLink="/forgot-password">Forgot password?</a>
        </div>

        <!-- ERROR -->
        <div class="error shake" *ngIf="errorMsg">
          {{ errorMsg }}
        </div>

        <!-- BUTTON -->
        <button type="submit" [disabled]="loading">
          <span *ngIf="!loading">Login</span>
          <span *ngIf="loading" class="loader"></span>
        </button>

      </form>

      <div class="links">
        <a routerLink="/signup">Create account</a>
      </div>

    </div>

  </div>
</div>
